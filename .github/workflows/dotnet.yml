name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Patch component is github.run_number; bump the prefix (1.0 -> 1.1) manually on minor
  # feature additions and (1.X -> 2.X) on breaking API changes. Patch increments here.
  VERSION_PREFIX: 1.1.${{ github.run_number }}
  VERSION_REV: ${{ github.run_attempt }}
  VERSION_HASH: +${{ github.sha }}
  BUILD_CONF: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
    - name: Test
      run: dotnet test src/SER.Lib.Tests -c $BUILD_CONF --no-build --logger "console;verbosity=detailed"
    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: '**/*.nupkg'
        retention-days: 5

  publish-nuget:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Download NuGet packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
    - name: Push NuGet package
      run: dotnet nuget push **/*.nupkg -s nuget.org -k ${{ secrets.NUGET_API_KEY }} --skip-duplicate
